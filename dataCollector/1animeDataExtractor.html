<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>애니메이션 수집기 (시네마 대응 버전)</title>
  <style>
    :root { --primary: #4a5568; --secondary: #38a169; --bg: #f5f7fa; }
    body { font-family: 'Pretendard', sans-serif; padding: 20px; background: var(--bg); color: #333; line-height: 1.6; }
    .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
    .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 18px; }
    
    .search-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
    .btn-search { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    .search-item { display: flex; gap: 12px; padding: 10px; border-bottom: 1px solid #edf2f7; cursor: pointer; align-items: center; }
    .search-item:hover { background: #f8fafc; }
    .search-item img { width: 45px; height: 63px; border-radius: 4px; object-fit: cover; }

    .edit-grid { display: grid; gap: 10px; margin-bottom: 20px; }
    .edit-row { display: flex; flex-direction: column; gap: 5px; }
    .edit-row label { font-size: 12px; font-weight: bold; color: #718096; }
    .edit-row input, .edit-row select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 14px; background: white; }
    
    .preview-header { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-start; }
    .preview-header img { width: 100px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    #codeOutput { width: 100%; height: 280px; font-family: 'Fira Code', monospace; background: #1a202c; color: #e2e8f0; padding: 15px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 13px; margin-top: 10px; }
    .btn-copy { width: 100%; background: var(--secondary); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="section">
    <h3>🔎 애니메이션 검색</h3>
    <input type="text" id="query" class="search-input" placeholder="제목 또는 MAL ID 입력" onkeypress="if(event.keyCode==13) searchAnime()">
    <button class="btn-search" onclick="searchAnime()">조사하기</button>
    <div id="status" style="font-size: 13px; color: #3182ce; margin-bottom: 10px;"></div>
    <div id="searchResult"></div>
  </div>

  <div class="section">
    <h3>📄 데이터 편집 & 추출</h3>
    <div id="editArea" style="display:none;">
      <div class="preview-header">
        <img id="p-img" src="">
        <div style="flex:1;">
          <div class="edit-row">
            <label>작품 제목 (한국어)</label>
            <input type="text" id="in-title" placeholder="제목 입력 시 썸네일 경로 자동생성" oninput="updateJSON()">
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <div class="edit-row">
              <label>분기 선택</label>
              <select id="in-quarter" onchange="updateJSON()">
                <option value="1분기">1분기 (Q1)</option>
                <option value="2분기">2분기 (Q2)</option>
                <option value="3분기">3분기 (Q3)</option>
                <option value="4분기">4분기 (Q4)</option>
              </select>
            </div>
            <div class="edit-row"><label>요일 (또는 Cinema)</label><input type="text" id="in-day" oninput="updateJSON()"></div>
          </div>
        </div>
      </div>

      <div class="edit-grid">
        <div class="edit-row"><label>제작사 (쉼표 구분)</label><input type="text" id="in-studio" oninput="updateJSON()"></div>
        <div class="edit-row"><label>감독 (쉼표 구분)</label><input type="text" id="in-director" oninput="updateJSON()"></div>
        <div class="edit-row"><label id="label-writer">각색가 (쉼표 구분)</label><input type="text" id="in-writer" oninput="updateJSON()"></div>
        <div class="edit-row"><label>캐릭터 디자인 (쉼표 구분)</label><input type="text" id="in-char" oninput="updateJSON()"></div>
        <input type="hidden" id="in-id"> </div>

      <textarea id="codeOutput" readonly></textarea>
      <button class="btn-copy" onclick="copyCode()">JSON 코드 복사하기</button>
    </div>
  </div>
</div>

<script>
  let currentAnime = {}; 

  async function searchAnime() {
    const query = document.getElementById('query').value.trim();
    if(!query) return;
    if (/^\d+$/.test(query)) { getAnimeDetail(query); return; }
    
    document.getElementById('status').innerText = "🔍 검색 중...";
    try {
      const resp = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=8`);
      const json = await resp.json();
      document.getElementById('searchResult').innerHTML = json.data.map(anime => `
        <div class="search-item" onclick="getAnimeDetail(${anime.mal_id})">
          <img src="${anime.images.jpg.image_url}">
          <div>
            <div style="font-weight:bold; font-size:14px;">${anime.title} [${anime.type || 'TV'}]</div>
            <div style="font-size:12px; color:#718096;">${anime.title_japanese || ''}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('status').innerText = `✅ 검색 완료`;
    } catch (e) { document.getElementById('status').innerText = "❌ 검색 에러"; }
  }

  async function getAnimeDetail(id) {
    document.getElementById('status').innerText = `⏳ 데이터 분석 중...`;
    try {
      const [aR, sR] = await Promise.all([
        fetch(`https://api.jikan.moe/v4/anime/${id}`),
        fetch(`https://api.jikan.moe/v4/anime/${id}/staff`)
      ]);
      const data = (await aR.json()).data;
      const staffData = (await sR.json()).data;
      const isOriginal = data.source === "Original";
      const isMovie = data.type === "Movie";

      document.getElementById('label-writer').innerText = isOriginal ? "각본가 (Original)" : "시리즈 구성 (Adaptor)";
      
      const staffObj = { director: [], writer: [], character_design: [] };
      staffData.forEach(p => {
        const pos = p.positions.map(x => x.toLowerCase());
        const name = p.person.name;
        if (pos.some(x => (x === 'director' || x === 'series director') && !x.includes('animation') && !x.includes('sound'))) staffObj.director.push(name);
        if (pos.some(x => x.includes('character design'))) staffObj.character_design.push(name);
        if (isOriginal) { if (pos.some(x => x === 'script')) staffObj.writer.push(name); }
        else { if (pos.some(x => x.includes('series composition'))) staffObj.writer.push(name); }
      });

      document.getElementById('editArea').style.display = "block";
      document.getElementById('p-img').src = data.images.jpg.large_image_url;
      document.getElementById('in-id').value = data.mal_id;
      document.getElementById('in-title').value = ""; 
      
      // 영화인 경우 day 필드에 Cinema 자동 입력
      document.getElementById('in-day').value = isMovie ? "Cinema" : (data.broadcast.day || "Unknown");
      
      document.getElementById('in-studio').value = data.studios.map(s => s.name).join(', ');
      document.getElementById('in-director').value = staffObj.director.join(', ');
      document.getElementById('in-writer').value = staffObj.writer.join(', ');
      document.getElementById('in-char').value = staffObj.character_design.join(', ');

      currentAnime = { 
        episodes: data.episodes || 0, 
        isOriginal: isOriginal,
        type: data.type 
      };
      
      updateJSON();
      document.getElementById('status').innerText = `✅ 로드 완료. 제목과 분기를 설정하세요.`;
    } catch (e) { document.getElementById('status').innerText = "❌ 상세 정보 에러"; }
  }
  
function updateJSON() {
    const title = document.getElementById('in-title').value.trim();
    const quarter = document.getElementById('in-quarter').value;
    const qKey = quarter.charAt(0); 
    const isMovie = currentAnime.type === "Movie";
    
    // 영화 여부에 따른 썸네일 경로 분기
    const autoThumbnail = title 
      ? (isMovie ? `image/cinema/${title}.webp` : `image/animeimg/Q${qKey}/${title}.webp`)
      : "";

    const writerField = currentAnime.isOriginal ? "scriptwriter" : "adaptor";
    const parseList = (id) => document.getElementById(id).value.split(',').map(s => s.trim()).filter(s => s);

    const finalObj = {
      id: parseInt(document.getElementById('in-id').value) || 0,
      title: title,
      quarter: quarter,
      thumbnail: autoThumbnail,
      day: document.getElementById('in-day').value,
      episodes: currentAnime.episodes || 0,
      studio: parseList('in-studio'),
      staff: {
        director: parseList('in-director'),
        [writerField]: parseList('in-writer'),
        character_design: parseList('in-char')
      }
    };

    document.getElementById('codeOutput').value = JSON.stringify(finalObj, null, 2) + ",";
  }

  async function copyCode() {
    const area = document.getElementById('codeOutput');
    const btn = document.querySelector('.btn-copy');
    try {
        await navigator.clipboard.writeText(area.value);
        const originalText = btn.innerText;
        btn.innerText = "✅ 복사 완료!";
        btn.style.background = "#2f855a";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "";
        }, 2000);
    } catch (err) {
        area.select();
        document.execCommand('copy');
        alert("코드가 복사되었습니다!");
    }
  }
</script>
</body>
</html>
