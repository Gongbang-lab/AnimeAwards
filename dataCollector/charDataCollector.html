<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캐릭터 추출기 (MAL ID 검색 버전)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* 기존 스타일 유지 및 일부 개선 */
    body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f8f9fa; }
    .header { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid #2563eb; }
    .search-area { max-width: 600px; display: flex; gap: 10px; align-items: center; }
    #idInput { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; font-size: 16px; }
    #idInput:focus { border-color: #2563eb; }
    
    .main { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
    .char-list { background: white; padding: 20px; border-radius: 12px; height: 750px; overflow-y: auto; border: 1px solid #e2e8f0; }
    .char-card { display: flex; gap: 15px; background: #fff; border: 1px solid #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
    .char-card img { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; background: #f8f9fa; }
    
    .edit-fields { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .edit-fields input { padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; }
    
    #jsonPreview { width: 100%; height: 600px; background: #0f172a; color: #f1f5f9; padding: 15px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 12px; box-sizing: border-box; overflow-x: auto; }
    .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    .btn-search { background: #2563eb; color: white; width: 120px; margin-top: 0; }
    .btn-zip { background: #ea580c; color: white; }
    .btn-copy { background: #16a34a; color: white; }
    .quarter-select { padding: 10px; border-radius: 6px; border: 2px solid #2563eb; font-weight: bold; }
    #status { font-weight: bold; color: #2563eb; }
  </style>
</head>
<body>

<div class="header">
  <h2>👥 캐릭터 추출기 (MAL ID 검색 방식)</h2>
  <div class="search-area">
    <input type="number" id="idInput" placeholder="MyAnimeList ID를 입력하세요 (예: 5114)" onkeypress="if(event.keyCode==13) fetchByMalId()">
    <button class="btn btn-search" onclick="fetchByMalId()">데이터 불러오기</button>
    
    <select id="quarterSelect" class="quarter-select" onchange="updateJSON()">
      <option value="Q1">Q1</option>
      <option value="Q2">Q2</option>
      <option value="Q3">Q3</option>
      <option value="Q4">Q4</option>
    </select>
  </div>
  <div style="margin-top: 15px; font-size: 14px; color: #64748b;">
    현재 로드된 애니메이션: <span id="currentTitle" style="color: #1e293b; font-weight: 600;">없음</span>
    <span id="status" style="margin-left: 20px;"></span>
  </div>
</div>

<div class="main">
  <div class="char-list" id="charList"></div>
  <div class="side-panel">
    <textarea id="jsonPreview" readonly placeholder="JSON 결과..."></textarea>
    <button class="btn btn-copy" onclick="copyJSON()">JSON 복사</button>
    <button id="zipBtn" class="btn btn-zip" onclick="downloadImagesZip()" disabled>📦 이미지 다운로드 (.ZIP)</button>
  </div>
</div>

<script>
  const API_URL = 'https://graphql.anilist.co';
  let animeData = null;
  let characterItems = [];

  function sanitize(str) {
    return str.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_');
  }

  // MAL ID를 통해 AniList에서 데이터를 직접 조회
  async function fetchByMalId() {
    const malId = document.getElementById('idInput').value;
    if (!malId) { alert("MAL ID를 입력해주세요."); return; }

    const statusEl = document.getElementById('status');
    statusEl.innerText = "⏳ 데이터 조회 중...";
    statusEl.style.color = "#2563eb";

    // AniList는 idMal 인자를 통해 MyAnimeList의 ID로 검색이 가능합니다.
    const query = `
      query($idMal: Int) {
        Media(idMal: $idMal, type: ANIME) {
          id
          idMal
          title { romaji }
          characters(sort: [ROLE, RELEVANCE], perPage: 50) {
            edges {
              role
              node {
                id
                name { full native }
                gender
                image { large }
              }
              voiceActors(language: JAPANESE) {
                name { full }
              }
            }
          }
        }
      }
    `;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables: { idMal: parseInt(malId) } })
      });
      
      const json = await res.json();
      
      if (json.errors) {
        throw new Error("애니메이션을 찾을 수 없습니다. (ID 확인 필요)");
      }

      animeData = json.data.Media;
      document.getElementById('currentTitle').innerText = animeData.title.romaji;
      
      characterItems = animeData.characters.edges
        .filter(edge => edge.role !== "BACKGROUND")
        .map(edge => ({
          engName: edge.node.name.full,
          korName: edge.node.name.native || edge.node.name.full,
          gender: edge.node.gender ? edge.node.gender.toLowerCase() : "unknown",
          cv: edge.voiceActors[0]?.name.full || "Unknown",
          imgUrl: edge.node.image.large
        }));

      renderChars();
      updateJSON();
      document.getElementById('zipBtn').disabled = false;
      statusEl.innerText = `✅ ${characterItems.length}명 로드됨`;
      
    } catch (err) {
      console.error(err);
      statusEl.innerText = "❌ 에러: " + err.message;
      statusEl.style.color = "#ef4444";
      animeData = null;
    }
  }

  function renderChars() {
    document.getElementById('charList').innerHTML = characterItems.map((c, i) => `
      <div class="char-card">
        <img src="${c.imgUrl}" alt="${c.engName}">
        <div class="edit-fields">
          <input type="text" value="${c.korName}" oninput="updateChar(${i}, 'korName', this.value)" placeholder="한글 이름">
          <input type="text" value="${c.cv}" oninput="updateChar(${i}, 'cv', this.value)" placeholder="성우 이름">
        </div>
      </div>`).join('');
  }

  function updateChar(i, key, val) { 
    characterItems[i][key] = val; 
    updateJSON(); 
  }

  function updateJSON() {
    if (!animeData) return;
    const quarter = document.getElementById('quarterSelect').value;
    const animeFolder = sanitize(animeData.title.romaji);

    const out = {
      id: animeData.idMal,
      title: animeData.title.romaji,
      characters: characterItems.map(c => ({
        name: c.korName,
        gender: c.gender,
        cv: c.cv,
        img: `image/charimg/${quarter}/${animeFolder}/${sanitize(c.engName)}.jpg`
      }))
    };
    document.getElementById('jsonPreview').value = JSON.stringify(out, null, 2);
  }

  async function downloadImagesZip() {
    const zip = new JSZip();
    const animeFolder = sanitize(animeData.title.romaji);
    document.getElementById('status').innerText = "🚀 이미지 압축 중...";
    
    await Promise.all(characterItems.map(async (c) => {
      try {
        const imgRes = await fetch(c.imgUrl);
        const blob = await imgRes.blob();
        zip.file(`${animeFolder}/${sanitize(c.engName)}.jpg`, blob);
      } catch (err) { console.error(err); }
    }));

    const content = await zip.generateAsync({type:"blob"});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(content);
    link.download = `${animeFolder}_images.zip`;
    link.click();
    document.getElementById('status').innerText = "✅ 다운로드 완료!";
  }

  function copyJSON() {
    const t = document.getElementById('jsonPreview'); 
    t.select(); 
    document.execCommand('copy'); 
    alert("JSON 복사됨!");
  }
</script>
</body>
</html>
