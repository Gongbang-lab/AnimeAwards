<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Data Converter</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); }

        .section { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-family: 'fira code', monospace;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-convert { background: var(--primary-color); color: white; }
        .btn-convert:hover { background: #357abd; }

        .btn-copy { background: #2ecc71; color: white; }
        .btn-copy:hover { background: #27ae60; }

        #output {
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'fira code', monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Anime Data Converter</h2>
    
    <div class="section">
        <label for="inputData">입력 (AnimeList JSON 객체)</label>
        <textarea id="inputData" placeholder="const AnimeList = [...] 또는 JSON 배열을 입력하세요."></textarea>
    </div>

    <div class="button-group">
        <button class="btn-convert" onclick="convertData()">변환하기</button>
        <button class="btn-copy" onclick="copyToClipboard()">결과 복사</button>
    </div>

    <div class="section">
        <label>결과 (animeOSTData)</label>
        <div id="output">// 결과가 여기에 표시됩니다.</div>
    </div>
</div>

<script>
    function convertData() {
        const input = document.getElementById('inputData').value.trim();
        const outputDiv = document.getElementById('output');

        try {
            // 입력값에서 'const AnimeList =' 같은 변수 선언부를 제거하고 순수 JSON만 추출
            let jsonString = input.replace(/const\s+\w+\s*=\s*/, '').replace(/;$/, '').trim();
            
            // 완벽한 JSON 형식이 아닐 경우를 대비해 eval 대신 JSON.parse 시도
            // (사용자가 JS 객체 형식으로 넣을 경우를 대비해 느슨한 변환 로직 적용)
            const sourceData = eval(jsonString); 

            if (!Array.isArray(sourceData)) {
                alert("배열 형태의 데이터가 아닙니다.");
                return;
            }

            const convertedData = sourceData.map(item => ({
                id: item.id,
                quarter: item.quarter,
                animeTitle: item.title,
                youtube: ""
            }));

            const resultText = `const animeOSTData = ${JSON.stringify(convertedData, null, 2)};`;
            outputDiv.textContent = resultText;
        } catch (error) {
            outputDiv.textContent = "에러: 데이터 형식을 확인해주세요.\n" + error.message;
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('output').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("클립보드에 복사되었습니다!");
        }).catch(err => {
            alert("복사 실패: " + err);
        });
    }
</script>

</body>
</html>
