<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Data Transformer</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 220px;
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
        }

        .btn-transform {
            background-color: var(--primary-color);
        }

        .btn-transform:hover {
            background-color: #357abd;
        }

        .btn-copy {
            background-color: #6c757d;
        }

        .btn-copy:hover {
            background-color: #5a6268;
        }

        .btn-copy.success {
            background-color: var(--success-color);
        }

        #output {
            background-color: #282c34;
            color: #abb2bf;
            height: 350px;
        }

        .label {
            font-weight: bold;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Anime JSON 데이터 구조 변환기</h2>
    
    <label class="label">1. 기존 AnimeList 데이터를 붙여넣으세요:</label>
    <textarea id="input" placeholder="const AnimeList = [ ... ];"></textarea>
    
    <div class="button-group">
        <button class="btn-transform" onclick="transformData()">데이터 구조 변환</button>
    </div>

    <label class="label">2. 변환된 결과 (JSON):</label>
    <textarea id="output" readonly placeholder="변환 버튼을 누르면 결과가 생성됩니다."></textarea>
    
    <div class="button-group">
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">결과 복사하기</button>
    </div>
</div>

<script>
    function transformData() {
        const inputStr = document.getElementById('input').value.trim();
        const outputArea = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        // 복사 버튼 상태 초기화
        copyBtn.innerText = "결과 복사하기";
        copyBtn.classList.remove('success');

        try {
            // 변수 할당문 제거 및 데이터 추출
            let cleanData = inputStr.replace(/^(const|let|var)\s+\w+\s*=\s*/, '').replace(/;$/, '');
            
            // eval을 사용해 JS 객체로 변환
            const rawData = eval(`(${cleanData})`);

            if (!Array.isArray(rawData)) {
                throw new Error("입력값이 배열 형식이 아닙니다.");
            }

            // 요청하신 새로운 데이터 구조로 매핑
            const transformedData = rawData.map(item => ({
                id: item.id,
                quarter: item.quarter,
                album: {
                    title: item.title,
                    coverImage: item.thumbnail ? item.thumbnail.replace('image/animeimg/Q1/', 'image/animeOST/') : "",
                    composer: [""] 
                }
            }));

            // 결과물 출력 (들여쓰기 2칸)
            outputArea.value = JSON.stringify(transformedData, null, 2);
            
        } catch (e) {
            alert("데이터 변환 실패: 형식을 확인해주세요.\n(" + e.message + ")");
        }
    }

    async function copyToClipboard() {
        const outputText = document.getElementById('output').value;
        const copyBtn = document.getElementById('copyBtn');

        if (!outputText) {
            alert("복사할 내용이 없습니다. 먼저 변환을 진행해주세요.");
            return;
        }

        try {
            await navigator.clipboard.writeText(outputText);
            
            // 시각적 피드백 제공
            copyBtn.innerText = "복사 완료! ✔";
            copyBtn.classList.add('success');
            
            // 2초 뒤 원래대로 복구
            setTimeout(() => {
                copyBtn.innerText = "결과 복사하기";
                copyBtn.classList.remove('success');
            }, 2000);

        } catch (err) {
            alert("복사에 실패했습니다. 수동으로 복사해주세요.");
        }
    }
</script>

</body>
</html>
