<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시네마 데이터 수집기 (객체 모드)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 40px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #222; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #666; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        
        button { width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-btn { background: #333; color: white; margin-bottom: 10px; }
        .search-btn:hover { background: #000; }
        
        .result-area { margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 25px; display: none; }
        
        .copy-btn { background: #007bff; color: white; margin-top: 20px; }
        .copy-btn:hover { background: #0056b3; }
        .copy-btn.success { background: #28a745; }

        #jsonPreview { 
            background: #222; color: #64ffda; padding: 15px; border-radius: 8px; 
            font-family: monospace; font-size: 0.9rem; overflow-x: auto; 
            white-space: pre-wrap; margin-top: 10px; border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Cinema Data Object</h2>
    <div class="input-group">
        <label>일본어 제목 입력</label>
        <input type="text" id="jpTitle" placeholder="예: 君の名は。">
        <button class="search-btn" onclick="searchAnime()">데이터 불러오기</button>
    </div>

    <div id="resultArea" class="result-area">
        <div class="input-group">
            <label>한글 제목 (수정 시 썸네일 경로 반영)</label>
            <input type="text" id="editTitle" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>제작사</label>
            <input type="text" id="editStudio" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>감독</label>
            <input type="text" id="editDirector" oninput="updateUI()">
        </div>
        <div class="input-group">
            <label>각본가</label>
            <input type="text" id="editWriter" oninput="updateUI()">
        </div>

        <label>JSON 객체 {} 미리보기</label>
        <div id="jsonPreview">{}</div>

        <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">JSON 객체 복사하기</button>
    </div>
</div>

<script>
    let currentData = {};

    async function searchAnime() {
        const query = document.getElementById('jpTitle').value;
        if (!query) return alert('제목을 입력해주세요!');

        try {
            const response = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&type=movie&limit=1`);
            const data = await response.json();

            if (data.data && data.data.length > 0) {
                const anime = data.data[0];
                const staffRes = await fetch(`https://api.jikan.moe/v4/anime/${anime.mal_id}/staff`);
                const staffData = await staffRes.json();
                
                const director = staffData.data.find(s => s.positions.some(p => p.includes('Director')))?.person.name || '';
                const writer = staffData.data.find(s => s.positions.some(p => p.includes('Script')))?.person.name || '';
                const studios = anime.studios.map(s => s.name).join(', ');

                // 폼 초기값 설정
                document.getElementById('editTitle').value = anime.title;
                document.getElementById('editStudio').value = studios;
                document.getElementById('editDirector').value = director;
                document.getElementById('editWriter').value = writer;
                
                document.getElementById('resultArea').style.display = 'block';
                updateUI();
            } else {
                alert('검색 결과가 없습니다.');
            }
        } catch (error) {
            alert('API 호출 오류!');
        }
    }

    // 입력 필드가 바뀔 때마다 JSON 객체를 업데이트 (배열 제외)
    function updateUI() {
        const title = document.getElementById('editTitle').value;
        currentData = {
            title: title,
            studio: document.getElementById('editStudio').value,
            director: document.getElementById('editDirector').value,
            writer: document.getElementById('editWriter').value,
            thumbnail: `image/movie/${title}.webp`
        };

        // 대괄호[] 없이 중괄호{}만 표시
        document.getElementById('jsonPreview').innerText = JSON.stringify(currentData, null, 4);
        
        const btn = document.getElementById('copyBtn');
        btn.innerText = "JSON 객체 복사하기";
        btn.classList.remove('success');
    }

    function copyToClipboard() {
        const jsonText = JSON.stringify(currentData, null, 4);
        navigator.clipboard.writeText(jsonText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "복사 완료! {}";
            btn.classList.add('success');
        });
    }
</script>

</body>
</html>
