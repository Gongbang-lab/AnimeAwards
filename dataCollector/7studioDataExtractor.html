<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Studio Data Extractor</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Pretendard', sans-serif; text-align: center; padding: 50px 20px; }
        .box { background: #222; display: inline-block; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; border: 1px solid #333; box-sizing: border-box; }
        
        /* 버튼 그룹 */
        .btn-group { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: all 0.2s; }
        #extract-btn { background: gold; color: #000; }
        #extract-btn:hover { background: #ffd700; transform: scale(1.02); }
        #copy-btn { background: #444; color: #fff; display: none; }
        #copy-btn:hover { background: #555; }
        
        /* 미리보기 영역 */
        #preview-container { margin-top: 30px; display: none; text-align: left; }
        #preview-header { font-size: 14px; color: #aaa; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #json-preview { 
            background: #000; color: #00ff41; padding: 20px; border-radius: 10px; 
            font-family: 'Consolas', 'Monaco', monospace; font-size: 13px;
            max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
            border: 1px solid #333; line-height: 1.5;
        }
        
        #status { margin-top: 20px; color: gold; font-weight: bold; white-space: pre-line; min-height: 40px; }
        .error-msg { color: #ff4d4d !important; }

        #json-preview::-webkit-scrollbar { width: 8px; }
        #json-preview::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>스튜디오 데이터 추출기</h1>
        <p style="color: #aaa;">애니메이션 데이터를 스튜디오별로 분류하여 코드를 생성합니다.</p>
        
        <div class="btn-group">
            <button id="extract-btn">데이터 분석하기</button>
            <button id="copy-btn">클립보드 복사</button>
        </div>

        <div id="status"></div>

        <div id="preview-container">
            <div id="preview-header">
                <span>미리보기 (Generated Code)</span>
                <span id="data-count" style="font-size: 12px;"></span>
            </div>
            <pre id="json-preview"></pre>
        </div>
    </div>

    <script src="../data/animeData.js"></script>

    <script>
let generatedCode = "";

document.getElementById('extract-btn').onclick = function() {
    const statusDiv = document.getElementById('status');
    const previewContainer = document.getElementById('preview-container');
    const previewArea = document.getElementById('json-preview');
    const copyBtn = document.getElementById('copy-btn');
    const dataCount = document.getElementById('data-count');
    
    try {
        if (typeof AnimeList === 'undefined') throw new Error("AnimeList 데이터를 로드할 수 없습니다.");

        const studioMap = {};
        
        AnimeList.forEach(anime => {
            const studioName = anime.studio || "Unknown Studio";

            if (!studioMap[studioName]) {
                studioMap[studioName] = {
                    studio: studioName,
                    studio_img: `image/studio/${studioName}.webp`,
                    works: []
                };
            }

            studioMap[studioName].works.push({
                title: anime.title,
                thumbnail: anime.thumbnail
            });
        });

        const finalData = Object.values(studioMap);
        generatedCode = "const AnimeStudioData = " + JSON.stringify(finalData, null, 2) + ";";

        // UI 업데이트
        previewArea.textContent = generatedCode;
        previewContainer.style.display = "block";
        copyBtn.style.display = "inline-block";
        dataCount.textContent = `Total Studios: ${finalData.length}`;
        
        statusDiv.className = "";
        statusDiv.innerText = `✅ 분석 완료! ${finalData.length}개의 스튜디오 데이터가 생성되었습니다.`;

    } catch (e) {
        statusDiv.className = "error-msg";
        statusDiv.innerText = "❌ 오류: " + e.message;
    }
};

document.getElementById('copy-btn').onclick = async function() {
    if (!generatedCode) return;
    
    try {
        await navigator.clipboard.writeText(generatedCode);
        const originalText = this.innerText;
        this.innerText = "✅ 복사 성공!";
        this.style.background = "gold";
        this.style.color = "#000";
        
        setTimeout(() => {
            this.innerText = originalText;
            this.style.background = "#444";
            this.style.color = "#fff";
        }, 2000);
    } catch (err) {
        alert("복사에 실패했습니다.");
    }
};
    </script>
</body>
</html>
